name: Setup api matrix
on:
  workflow_call:
    secrets:
      GRADLE_CACHE_ENCRYPTION_KEY:
        required: false
    inputs:
      java-version:
        type: string
        required: false
        default: '25'
    outputs:
      matrix:
        value: ${{ jobs.create_matrix.outputs.task_output }}

permissions:
  contents: read
jobs:
  create_matrix:
    name: Create api matrix
    runs-on: ubuntu-latest
    outputs:
      task_output: ${{ steps.create_matrix.outputs.taskoutput }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '${{ inputs.java-version }}'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
      - name: Create api matrix
        id: create_matrix
        shell: bash
        run: |
          TASKS=$(./gradlew tasks | awk '/- Write JSON/ {print $1}')
          echo "taskoutput=$(echo "$TASKS" | jq -cRn "{"project":[inputs]}")" >> $GITHUB_OUTPUT
