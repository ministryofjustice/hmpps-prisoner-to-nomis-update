name: Setup test matrix
on:
  workflow_call:
    inputs:
      java-version:
        type: string
        required: false
        default: '25'
    outputs:
      matrix:
        value: ${{ jobs.create_matrix.outputs.task_output }}

permissions:
  contents: read
jobs:
  create_matrix:
    name: Create test matrix
    runs-on: ubuntu-latest
    outputs:
      task_output: ${{ steps.create_matrix.outputs.taskoutput }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '${{ inputs.java-version }}'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
      - name: Create test matrix
        id: create_matrix
        shell: bash
        run: |
          TASKS=$(./gradlew tasks | awk 'BEGIN { print "test"} /- Run tests/ {print $1}')
          echo "taskoutput=$(echo "$TASKS" | jq -cRn "{"tests":[inputs]}")" >> $GITHUB_OUTPUT
